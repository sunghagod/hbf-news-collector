name: Daily News

on:
  schedule:
    # UTC 23:00 = KST 08:00
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  hbf:
    name: HBF Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Collect articles
        run: python collect_hbf.py

      - name: Generate daily report
        run: python daily_top10.py

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python discord_send.py

      - name: Save sent history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_history.json
          git diff --cached --quiet || git commit -m "update sent history [skip ci]"
          git push

  energy:
    name: Energy Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: hbf

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Collect articles
        run: python collect_energy.py

      - name: Generate daily report
        run: python daily_energy.py

      - name: Send to Discord
        env:
          DISCORD_ENERGY_WEBHOOK_URL: ${{ secrets.DISCORD_ENERGY_WEBHOOK_URL }}
        run: python discord_energy.py

      - name: Save sent history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp sent_history_energy.json /tmp/sent_history_energy.json
          git checkout -- .
          git pull --rebase origin main
          cp /tmp/sent_history_energy.json sent_history_energy.json
          git add sent_history_energy.json
          git diff --cached --quiet || git commit -m "update energy sent history [skip ci]"
          git push
